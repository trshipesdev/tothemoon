services:
  cryptobot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist state between container restarts
      - ./data:/app/data
    # Oracle VCN DNS (169.254.169.254) can't resolve .ag TLD (Jupiter API).
    # Force Google + Cloudflare DNS so quote-api.jup.ag resolves correctly.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # Flask status endpoint — remove or restrict if exposed publicly
    ports:
      - "127.0.0.1:8787:8787"
